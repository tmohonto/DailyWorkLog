name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Triggered when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create config.js from Secrets
        run: |
          echo "window.CONFIG = {" > config.js
          echo "  FIREBASE: {" >> config.js
          echo "    apiKey: '${{ secrets.FIREBASE_API_KEY }}'," >> config.js
          echo "    authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}'," >> config.js
          echo "    projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'," >> config.js
          echo "    storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}'," >> config.js
          echo "    messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'," >> config.js
          echo "    appId: '${{ secrets.FIREBASE_APP_ID }}'," >> config.js
          echo "    measurementId: '${{ secrets.FIREBASE_MEASUREMENT_ID }}'" >> config.js
          echo "  }," >> config.js
          echo "  GOOGLE_SHEETS: {" >> config.js
          echo "    DEFAULT_SPREADSHEET_ID: '${{ secrets.DEFAULT_SPREADSHEET_ID }}'" >> config.js
          echo "  }" >> config.js
          echo "};" >> config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder you want to deploy (the whole root)
          branch: gh-pages # Deploys to this branch
